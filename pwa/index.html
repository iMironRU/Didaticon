<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <title>ЭИОС</title>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      // FOUC prevention — применяем тему / размер шрифта / accessibility prefs
      // ДО загрузки React. Иначе при включённом high_contrast / dyslexia /
      // reduced_motion / large font UI моргает дефолтным состоянием.
      (function(){
        var html  = document.documentElement;
        var saved = localStorage.getItem("eios_theme") || "auto";
        var mode  = saved === "auto"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : saved;
        html.setAttribute("data-theme", mode);
        var fs = localStorage.getItem("eios_font_size");
        if (fs === "s") html.style.fontSize = "14px";
        else if (fs === "l") html.style.fontSize = "18px";
        if (localStorage.getItem("eios_a11y_contrast") === "1") html.dataset.contrast = "high";
        if (localStorage.getItem("eios_a11y_motion")   === "1") html.dataset.motion   = "reduce";
        if (localStorage.getItem("eios_a11y_dyslexia") === "1") html.dataset.dyslexia = "true";
      })();
    </script>
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Мгновенный первый экран до загрузки React — заменяется при монтировании. -->
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#091629;">
        <div style="width:80px;height:80px;border-radius:20px;background:#0F2545;border:0.5px solid #2F5A8A;display:flex;align-items:center;justify-content:center;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L1 9l11 6 9-4.91V17M5 13.18v4L12 21l7-3.82v-4"/></svg>
        </div>
        <div style="width:18px;height:18px;border-radius:50%;border:2px solid rgba(127,164,204,0.3);border-top-color:#7FA4CC;animation:spin 0.8s linear infinite;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
