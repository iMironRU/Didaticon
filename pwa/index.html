<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <title>ЭИОС</title>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      // FOUC prevention — применяем тему / размер шрифта / accessibility prefs
      // ДО загрузки React. Иначе при включённом high_contrast / dyslexia /
      // reduced_motion / large font UI моргает дефолтным состоянием.
      (function(){
        var html  = document.documentElement;
        var saved = localStorage.getItem("eios_theme") || "auto";
        var mode  = saved === "auto"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : saved;
        html.setAttribute("data-theme", mode);
        var fs = localStorage.getItem("eios_font_size");
        if (fs === "s") html.style.fontSize = "14px";
        else if (fs === "l") html.style.fontSize = "18px";
        if (localStorage.getItem("eios_a11y_contrast") === "1") html.dataset.contrast = "high";
        if (localStorage.getItem("eios_a11y_motion")   === "1") html.dataset.motion   = "reduce";
        if (localStorage.getItem("eios_a11y_dyslexia") === "1") html.dataset.dyslexia = "true";
      })();
    </script>
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
