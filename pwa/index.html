<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <title>ЭИОС</title>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      // FOUC prevention — применяем тему и размер шрифта ДО загрузки React,
      // иначе у тёмного юзера моргает светлая, а у L/S — мелкий или крупный
      // шрифт сначала рендерится в дефолтном 16px.
      (function(){
        var saved = localStorage.getItem("eios_theme") || "auto";
        var mode  = saved === "auto"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : saved;
        document.documentElement.setAttribute("data-theme", mode);
        var fs = localStorage.getItem("eios_font_size");
        if (fs === "s") document.documentElement.style.fontSize = "14px";
        else if (fs === "l") document.documentElement.style.fontSize = "18px";
      })();
    </script>
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
