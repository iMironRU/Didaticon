# Статика: PWA + SCORM-пакеты на ОДНОМ origin (важно для scorm-again,
# обнаружение window.API идёт по дереву окон). Прокси /api → клей.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # index.html и config.js — всегда свежие (не кэшировать).
  location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
  location = /config.js  { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }

  # Хэшированные ассеты — кэшировать навсегда (хэш меняется при изменении).
  location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; try_files $uri =404; }

  location /scorm/ { try_files $uri =404; }
  location /api/   { proxy_pass http://glue:8080/; }
  # Admin — multi-page Vite build, отдельный SPA в /admin/
  location /admin  { try_files $uri $uri/ /admin/index.html; }
  location /       { try_files $uri /index.html; }
}
