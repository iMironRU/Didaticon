# Продакшн-оверрайд: добавляет Caddy (HTTPS) и убирает прямое открытие портов.
# Использование: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    environment:
      EIOS_DOMAIN: ${EIOS_DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - static

  glue:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-imironru}/didaticon-glue:latest
    build: !reset null
    ports: !reset []
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SCORM_PATH: /scorm
    volumes:
      - scormdata:/scorm

  static:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-imironru}/didaticon-pwa:latest
    build: !reset null
    ports: !reset []
    environment:
      VITE_OIDC_ISSUER: ${OIDC_ISSUER}
      VITE_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-eios-pwa}
    volumes:
      - scormdata:/usr/share/nginx/html/scorm

volumes:
  caddydata:
  caddyconfig:
  scormdata:
