# Центральный стек ЭИОС. Univerkon (1С) в стек НЕ входит — это существующая
# база организации, к которой клей обращается по сети (см. glue/.env).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eios
      POSTGRES_USER: eios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eios}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eios"]
      interval: 5s
      timeout: 3s
      retries: 10

  glue:
    build: ./glue
    restart: unless-stopped
    env_file: ./glue/.env
    environment:
      EIOS_STORE: sqlite
      EIOS_SQLITE_PATH: /data/glue.sqlite
      SCORM_PATH: /scorm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gluedata:/data
      - scormdata:/scorm
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  # Статика: SCORM-пакеты + собранный PWA. Один origin (важно для scorm-again).
  static:
    build:
      context: ./pwa
      args:
        COMMIT_HASH: ${COMMIT_HASH:-dev}
    volumes:
      - scormdata:/usr/share/nginx/html/scorm
    ports:
      - "8081:80"
    depends_on:
      - glue

volumes:
  pgdata:
  gluedata:
  scormdata:
